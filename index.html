<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPEO - Indicadores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root{
      --primary:#0097CE;
      --primary-dark:#007aa5;
      --orange:#F36F21;
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --success:#137333;
      --danger:#b3261e;
      --warning:#b26a00;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:"Segoe UI", Arial, sans-serif;
      background:linear-gradient(180deg,#eef6fa 0%, #f4f6f8 100%);
      color:var(--text);
    }

    .hidden{ display:none !important; }

    .login-wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .login-card{
      width:100%;
      max-width:430px;
      background:var(--card);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:32px;
      border:1px solid rgba(0,0,0,.04);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:24px;
    }

    .brand-icon{
      width:52px;
      height:52px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      box-shadow:0 10px 24px rgba(0,151,206,.25);
    }

    .brand h1{
      font-size:24px;
      margin:0;
    }

    .brand p{
      margin:2px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .field{
      margin-bottom:16px;
    }

    .field label{
      display:block;
      font-weight:600;
      margin-bottom:8px;
      font-size:14px;
    }

    .input{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px 14px;
      font-size:15px;
      outline:none;
      background:#fff;
      transition:.2s;
    }

    .input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(0,151,206,.12);
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-weight:700;
      cursor:pointer;
      transition:.2s;
      font-size:15px;
    }

    .btn-primary{
      width:100%;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      box-shadow:0 10px 20px rgba(0,151,206,.22);
    }

    .btn-primary:hover{ transform:translateY(-1px); }

    .msg{
      margin-top:14px;
      font-size:14px;
      padding:12px 14px;
      border-radius:12px;
      display:none;
    }

    .msg.error{
      display:block;
      background:#fdecec;
      color:var(--danger);
      border:1px solid #f7c7c7;
    }

    .msg.success{
      display:block;
      background:#ecf8ee;
      color:var(--success);
      border:1px solid #c9e9cf;
    }

    .app{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:260px;
      background:linear-gradient(180deg,#0a91c4 0%, #007aa5 100%);
      color:#fff;
      padding:22px 18px;
      position:sticky;
      top:0;
      height:100vh;
      box-shadow:4px 0 20px rgba(0,0,0,.06);
    }

    .sidebar .logo{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:24px;
      padding:8px 10px;
    }

    .sidebar .logo .icon{
      width:44px;
      height:44px;
      border-radius:14px;
      background:rgba(255,255,255,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
    }

    .sidebar .logo strong{
      display:block;
      font-size:18px;
    }

    .sidebar .logo span{
      display:block;
      opacity:.9;
      font-size:12px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .menu button{
      width:100%;
      border:none;
      border-radius:14px;
      padding:13px 14px;
      background:rgba(255,255,255,.10);
      color:#fff;
      text-align:left;
      cursor:pointer;
      font-weight:600;
      transition:.2s;
    }

    .menu button:hover,
    .menu button.active{
      background:rgba(255,255,255,.20);
    }

    .sidebar-footer{
      position:absolute;
      left:18px;
      right:18px;
      bottom:18px;
      background:rgba(255,255,255,.10);
      border-radius:16px;
      padding:14px;
      font-size:13px;
    }

    .sidebar-footer .user-name{
      font-weight:700;
      margin-bottom:4px;
    }

    .sidebar-footer .muted{
      opacity:.88;
      margin-bottom:10px;
    }

    .logout-btn{
      width:100%;
      background:#fff;
      color:var(--primary-dark);
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-weight:700;
      cursor:pointer;
    }

    .main{
      flex:1;
      padding:24px;
      min-width:0;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:22px;
      flex-wrap:wrap;
    }

    .title-area h2{
      margin:0;
      font-size:28px;
    }

    .title-area p{
      margin:6px 0 0;
      color:var(--muted);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn-soft{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
      padding:12px 14px;
    }

    .btn-soft:hover{
      border-color:var(--primary);
      color:var(--primary-dark);
    }

    .panel{
      background:var(--card);
      border:1px solid rgba(0,0,0,.04);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    .panel-title{
      font-size:16px;
      font-weight:800;
      margin-bottom:14px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .filters{
      display:grid;
      grid-template-columns:repeat(4, minmax(180px,1fr));
      gap:12px;
    }

    .filters .full{
      grid-column:span 2;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:16px;
      margin-bottom:18px;
    }

    .card{
      background:var(--card);
      border-radius:20px;
      border:1px solid rgba(0,0,0,.04);
      box-shadow:var(--shadow);
      padding:18px;
      position:relative;
      overflow:hidden;
    }

    .card::after{
      content:"";
      position:absolute;
      right:-20px;
      top:-20px;
      width:90px;
      height:90px;
      border-radius:50%;
      background:rgba(0,151,206,.06);
    }

    .card-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .card-title{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .card-icon{
      width:42px;
      height:42px;
      border-radius:14px;
      background:#eef8fc;
      color:var(--primary-dark);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
    }

    .card-value{
      font-size:30px;
      font-weight:800;
      line-height:1;
      margin-bottom:8px;
    }

    .meta-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:13px;
      color:var(--muted);
      margin-bottom:10px;
    }

    .progress{
      height:9px;
      background:#edf1f4;
      border-radius:999px;
      overflow:hidden;
    }

    .progress > div{
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--primary),var(--orange));
      width:0%;
    }

    .table-wrap{
      overflow:auto;
      border-radius:18px;
      border:1px solid var(--border);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:720px;
      background:#fff;
    }

    thead th{
      background:#f8fafc;
      color:#475569;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.3px;
    }

    th, td{
      padding:14px 12px;
      border-bottom:1px solid var(--border);
      text-align:left;
      font-size:14px;
      white-space:nowrap;
    }

    tbody tr:hover{
      background:#fafcfe;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
    }

    .badge.ok{
      background:#ecf8ee;
      color:var(--success);
    }

    .badge.warn{
      background:#fff4e8;
      color:var(--warning);
    }

    .badge.bad{
      background:#fdecec;
      color:var(--danger);
    }

    .empty{
      padding:24px;
      text-align:center;
      color:var(--muted);
    }

    .loading{
      opacity:.7;
      pointer-events:none;
    }

    @media (max-width: 980px){
      .sidebar{
        display:none;
      }

      .main{
        padding:16px;
      }

      .filters{
        grid-template-columns:1fr;
      }

      .filters .full{
        grid-column:span 1;
      }

      .topbar{
        align-items:flex-start;
      }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <section id="loginScreen" class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon">
          <i class="bi bi-bar-chart-line-fill"></i>
        </div>
        <div>
          <h1>IPEO</h1>
          <p>Indicadores individuais</p>
        </div>
      </div>

      <div class="field">
        <label for="matricula">Matrícula</label>
        <input id="matricula" class="input" type="text" placeholder="Digite sua matrícula" />
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input id="senha" class="input" type="password" placeholder="Digite sua senha" />
      </div>

      <button class="btn btn-primary" onclick="login()">Entrar</button>

      <div id="loginMsg" class="msg"></div>
    </div>
  </section>

  <!-- APP -->
  <section id="appScreen" class="app hidden">
    <aside class="sidebar">
      <div class="logo">
        <div class="icon"><i class="bi bi-grid-1x2-fill"></i></div>
        <div>
          <strong>IPEO</strong>
          <span>Painel de Indicadores</span>
        </div>
      </div>

      <div class="menu">
        <button class="active" onclick="showPage('dashboard', this)">
          <i class="bi bi-house-door"></i> Dashboard
        </button>
        <button onclick="showPage('resultados', this)">
          <i class="bi bi-table"></i> Resultados
        </button>
      </div>

      <div class="sidebar-footer">
        <div id="sidebarUserName" class="user-name">-</div>
        <div id="sidebarUserInfo" class="muted">-</div>
        <button class="logout-btn" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i> Sair
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title-area">
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSubtitle">Acompanhe seus indicadores de forma rápida.</p>
        </div>

        <div class="actions">
          <button class="btn btn-soft" onclick="carregarDados()">
            <i class="bi bi-arrow-clockwise"></i> Atualizar
          </button>
        </div>
      </div>

      <section id="adminFilters" class="panel hidden">
        <div class="panel-title">
          <i class="bi bi-shield-lock"></i> Filtros do administrador
        </div>

        <div class="filters">
          <div>
            <label for="filtroMatricula">Matrícula</label>
            <input id="filtroMatricula" class="input" type="text" placeholder="Ex.: 3080117" />
          </div>

          <div>
            <label for="filtroNome">Nome</label>
            <input id="filtroNome" class="input" type="text" placeholder="Buscar por nome" />
          </div>

          <div>
            <label for="filtroMes">Mês</label>
            <input id="filtroMes" class="input" type="month" />
          </div>

          <div style="display:flex;align-items:flex-end;gap:10px;">
            <button class="btn btn-primary" style="width:100%;" onclick="carregarDados()">Aplicar</button>
          </div>
        </div>
      </section>

      <section id="dashboardPage">
        <div class="cards" id="cards"></div>
      </section>

      <section id="resultadosPage" class="hidden">
        <div class="panel">
          <div class="panel-title">
            <i class="bi bi-table"></i> Resultados detalhados
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Indicador</th>
                  <th>Matrícula</th>
                  <th>Nome</th>
                  <th>Real</th>
                  <th>Meta</th>
                  <th>% Atingimento</th>
                  <th>Status</th>
                  <th>Referência</th>
                </tr>
              </thead>
              <tbody id="tbodyResultados">
                <tr><td colspan="8" class="empty">Nenhum dado carregado.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </section>

  <script>
    const API_BASE = "https://SEU-WORKER.workers.dev";
    let usuarioLogado = null;
    let ultimoDashboard = null;

    function setLoginMsg(texto, tipo = "error"){
      const el = document.getElementById("loginMsg");
      el.className = "msg " + tipo;
      el.textContent = texto;
    }

    function limparLoginMsg(){
      const el = document.getElementById("loginMsg");
      el.className = "msg";
      el.textContent = "";
    }

    function getToken(){
      return localStorage.getItem("ipeo_token") || "";
    }

    function setToken(token){
      localStorage.setItem("ipeo_token", token);
    }

    function clearToken(){
      localStorage.removeItem("ipeo_token");
    }

    function authHeaders(){
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + getToken()
      };
    }

    function showPage(page, btn = null){
      document.getElementById("dashboardPage").classList.toggle("hidden", page !== "dashboard");
      document.getElementById("resultadosPage").classList.toggle("hidden", page !== "resultados");

      document.getElementById("pageTitle").textContent = page === "dashboard" ? "Dashboard" : "Resultados";
      document.getElementById("pageSubtitle").textContent =
        page === "dashboard"
          ? "Acompanhe seus indicadores de forma rápida."
          : "Detalhamento dos indicadores e metas.";

      document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");
    }

    async function login(){
      limparLoginMsg();

      const matricula = document.getElementById("matricula").value.trim();
      const senha = document.getElementById("senha").value.trim();

      if (!matricula || !senha){
        setLoginMsg("Informe matrícula e senha.");
        return;
      }

      const btn = document.querySelector(".btn-primary");
      btn.disabled = true;
      btn.textContent = "Entrando...";

      try{
        const res = await fetch(API_BASE + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ matricula, senha, origem: "ipeo" })
        });

        const data = await res.json();

        if (!res.ok || !data.ok){
          throw new Error(data.error || "Falha no login");
        }

        setToken(data.token);
        await validarSessao();
      }catch(err){
        setLoginMsg(err.message || "Não foi possível entrar.");
      }finally{
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    }

    async function validarSessao(){
      try{
        const res = await fetch(API_BASE + "/me", {
          headers: authHeaders()
        });

        const data = await res.json();

        if (!res.ok || !data.ok) throw new Error(data.error || "Sessão inválida");

        usuarioLogado = data.usuario;

        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("appScreen").classList.remove("hidden");

        document.getElementById("sidebarUserName").textContent = usuarioLogado.nome || "Usuário";
        document.getElementById("sidebarUserInfo").textContent =
          `${usuarioLogado.matricula} • ${usuarioLogado.isAdmin ? "Administrador" : "Colaborador"}`;

        document.getElementById("adminFilters").classList.toggle("hidden", !usuarioLogado.isAdmin);

        await carregarDados();
      }catch(err){
        clearToken();
        usuarioLogado = null;
        document.getElementById("loginScreen").classList.remove("hidden");
        document.getElementById("appScreen").classList.add("hidden");
      }
    }

    function logout(){
      clearToken();
      usuarioLogado = null;
      ultimoDashboard = null;
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("appScreen").classList.add("hidden");
      document.getElementById("senha").value = "";
      limparLoginMsg();
    }

    async function carregarDados(){
      if (!usuarioLogado) return;

      const cards = document.getElementById("cards");
      const tbody = document.getElementById("tbodyResultados");

      cards.classList.add("loading");
      tbody.innerHTML = `<tr><td colspan="8" class="empty">Carregando...</td></tr>`;

      try{
        const params = new URLSearchParams();

        if (usuarioLogado.isAdmin){
          const matricula = document.getElementById("filtroMatricula").value.trim();
          const nome = document.getElementById("filtroNome").value.trim();
          const mes = document.getElementById("filtroMes").value.trim();

          if (matricula) params.set("matricula", matricula);
          if (nome) params.set("nome", nome);
          if (mes) params.set("mes", mes);
        }

        const url = API_BASE + "/ipeo-dashboard" + (params.toString() ? `?${params.toString()}` : "");
        const res = await fetch(url, { headers: authHeaders() });
        const data = await res.json();

        if (!res.ok || !data.ok){
          throw new Error(data.error || "Erro ao carregar indicadores");
        }

        ultimoDashboard = data;
        renderCards(data.kpis || []);
        renderTabela(data.resultados || []);
      }catch(err){
        renderCards([]);
        tbody.innerHTML = `<tr><td colspan="8" class="empty">${err.message || "Erro ao carregar dados."}</td></tr>`;
      }finally{
        cards.classList.remove("loading");
      }
    }

    function formatPercent(v){
      const n = Number(v || 0);
      return `${n.toFixed(1).replace(".", ",")}%`;
    }

    function getStatusInfo(real, meta){
      const r = Number(real || 0);
      const m = Number(meta || 0);
      const pct = m > 0 ? (r / m) * 100 : 0;

      if (pct >= 100){
        return { label: "Meta atingida", cls: "ok", pct };
      }
      if (pct >= 85){
        return { label: "Atenção", cls: "warn", pct };
      }
      return { label: "Abaixo da meta", cls: "bad", pct };
    }

    function renderCards(lista){
      const el = document.getElementById("cards");

      if (!lista.length){
        el.innerHTML = `
          <div class="panel" style="grid-column:1/-1;">
            <div class="empty">Nenhum indicador encontrado.</div>
          </div>
        `;
        return;
      }

      el.innerHTML = lista.map((item, idx) => {
        const status = getStatusInfo(item.real, item.meta);
        const icones = [
          "bi-speedometer2",
          "bi-graph-up-arrow",
          "bi-bullseye",
          "bi-bar-chart-line",
          "bi-award",
          "bi-lightning-charge"
        ];
        const icon = icones[idx % icones.length];

        return `
          <div class="card">
            <div class="card-top">
              <div class="card-title">${item.nome}</div>
              <div class="card-icon"><i class="bi ${icon}"></i></div>
            </div>

            <div class="card-value">${formatPercent(item.real)}</div>

            <div class="meta-row">
              <span>Meta: <strong>${formatPercent(item.meta)}</strong></span>
              <span>${status.pct.toFixed(0)}% da meta</span>
            </div>

            <div class="progress">
              <div style="width:${Math.min(status.pct, 100)}%"></div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderTabela(lista){
      const el = document.getElementById("tbodyResultados");

      if (!lista.length){
        el.innerHTML = `<tr><td colspan="8" class="empty">Nenhum resultado encontrado.</td></tr>`;
        return;
      }

      el.innerHTML = lista.map(item => {
        const status = getStatusInfo(item.real, item.meta);
        return `
          <tr>
            <td><strong>${item.indicador || "-"}</strong></td>
            <td>${item.matricula || "-"}</td>
            <td>${item.nome || "-"}</td>
            <td>${formatPercent(item.real)}</td>
            <td>${formatPercent(item.meta)}</td>
            <td>${status.pct.toFixed(1).replace(".", ",")}%</td>
            <td><span class="badge ${status.cls}">${status.label}</span></td>
            <td>${item.referencia || "-"}</td>
          </tr>
        `;
      }).join("");
    }

    validarSessao();
  </script>
</body>
</html>
