<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard IPEO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
  --primary:#0097CE;
  --primary-dark:#007fb0;
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#333;
  --border:#e0e0e0;
  --success:#137333;
  --danger:#b3261e;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Segoe UI",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:var(--primary);
  color:#fff;
  min-height:100vh;
  padding:20px;
}

.sidebar h2{
  font-size:18px;
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:6px;
  background:#ffffff20;
  color:#fff;
  cursor:pointer;
  transition:.2s;
}

.sidebar button:hover{
  background:#ffffff40;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.header h1{
  font-size:22px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:var(--card);
  border-radius:10px;
  padding:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card h3{
  font-size:14px;
  color:#666;
}

.card .value{
  font-size:22px;
  font-weight:bold;
  margin-top:5px;
}

/* TABLE */
.table{
  margin-top:20px;
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
}

.table table{
  width:100%;
  border-collapse:collapse;
}

.table th, .table td{
  padding:10px;
  border-bottom:1px solid var(--border);
  text-align:left;
}

.table th{
  background:#f0f2f5;
}

/* PAGES */
.page{
  display:none;
}

.page.active{
  display:block;
}

/* BUTTON */
.btn{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:6px;
  cursor:pointer;
}

.btn:hover{
  background:var(--primary-dark);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>📊 IPEO</h2>
  <button onclick="showPage('home')"><i class="bi bi-house"></i> Início</button>
  <button onclick="showPage('resultados')"><i class="bi bi-bar-chart"></i> Resultados</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HOME -->
  <div id="home" class="page active">
    <div class="header">
      <h1>Bem-vindo</h1>
      <button class="btn" onclick="carregar()">Atualizar</button>
    </div>

    <div class="cards" id="cardsHome"></div>
  </div>

  <!-- RESULTADOS -->
  <div id="resultados" class="page">
    <div class="header">
      <h1>Resultados</h1>
    </div>

    <div class="cards" id="cardsResultados"></div>

    <div class="table">
      <table>
        <thead>
          <tr>
            <th>Indicador</th>
            <th>Real</th>
            <th>Meta</th>
          </tr>
        </thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const API_BASE = 'https://SEU-WORKER.workers.dev/api';

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function carregar(){
  let data;

  try{
    const res = await fetch(API_BASE + '/dashboard');
    data = await res.json();
  }catch{
    // fallback local
    data = {
      indicadores:[
        {nome:'DI',valor:92,meta:90},
        {nome:'ROE',valor:88,meta:85},
        {nome:'IOC',valor:75,meta:80},
        {nome:'ISF',valor:95,meta:90}
      ]
    };
  }

  renderCards('cardsHome', data.indicadores);
  renderCards('cardsResultados', data.indicadores);
  renderTabela(data.indicadores);
}

function renderCards(containerId, lista){
  const el = document.getElementById(containerId);
  el.innerHTML = '';

  lista.forEach(i=>{
    el.innerHTML += `
      <div class="card">
        <h3>${i.nome}</h3>
        <div class="value">${i.valor}%</div>
      </div>
    `;
  });
}

function renderTabela(lista){
  const el = document.getElementById('tabela');
  el.innerHTML = '';

  lista.forEach(i=>{
    el.innerHTML += `
      <tr>
        <td>${i.nome}</td>
        <td>${i.valor}%</td>
        <td>${i.meta}%</td>
      </tr>
    `;
  });
}

carregar();
</script>

</body>
</html>
